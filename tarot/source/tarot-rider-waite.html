/* ---------- Simbolismo e reflexão (por carta) ---------- */
const EXTRA={
"The Fool":{sym:"O jovem caminha à beira do precipício de olhos no céu, com a rosa branca da pureza numa mão e a trouxa das experiências na outra. O cão branco é o instinto que avisa e acompanha, e o sol nasce sobre tudo: a viagem começa protegida.",q:["Que salto estou a adiar por excesso de cálculo?","Onde posso voltar a agir com mais leveza e confiança?"]},
"The Magician":{sym:"Sobre a mesa estão os quatro naipes, todos os recursos disponíveis. Uma mão aponta ao céu e a outra à terra, com o infinito sobre a cabeça: o Mago é canal entre os planos. As rosas e os lírios do jardim falam de desejo e pureza a trabalhar juntos.",q:["Que recursos já tenho e ainda não estou a usar?","O que quero manifestar de forma concreta esta semana?"]},
"The High Priestess":{sym:"Sentada entre o pilar negro e o branco (Boaz e Jachin), guarda o véu bordado de romãs que separa o visível do oculto. A lua aos pés e o rolo da Torá semiencoberto dizem que nem todo o saber se entrega de imediato.",q:["Que sinal subtil tenho vindo a ignorar?","Onde preciso de mais silêncio para ouvir a minha intuição?"]},
"The Empress":{sym:"Rodeada de trigo maduro e de um bosque com cascata, usa a coroa de doze estrelas e recosta-se em almofadas com o símbolo de Vénus. Tudo na cena é fertilidade em acto: a natureza a dar fruto sem esforço aparente.",q:["O que estou a criar que precisa de mais cuidado para florescer?","Como posso dar mais espaço ao prazer e ao corpo?"]},
"The Emperor":{sym:"O trono de pedra é decorado com cabeças de carneiro, símbolo de Marte. Segura o ceptro e o orbe, com armadura sob o manto: o poder que protege. As montanhas áridas atrás falam de autoridade conquistada em terreno duro.",q:["Onde falta estrutura na minha vida neste momento?","Estou a liderar ou apenas a controlar?"]},
"The Hierophant":{sym:"Entre dois pilares, abençoa dois acólitos com a mão em gesto ritual. A tripla coroa e o triplo ceptro marcam os três mundos, e as chaves cruzadas aos pés abrem o conhecimento guardado pela tradição.",q:["Que ensinamento recebido merece ser honrado, ou questionado?","Onde procuro pertença, e a que preço?"]},
"The Lovers":{sym:"O anjo Rafael abençoa o casal sob o sol. Atrás da mulher, a árvore do conhecimento com a serpente; atrás do homem, a árvore de doze chamas. A escolha entre consciência e desejo faz-se à vista do céu.",q:["Esta escolha está alinhada com os meus valores?","O que é que eu e o outro vemos um no outro de essencial?"]},
"The Chariot":{sym:"O condutor não segura rédeas: guia as duas esfinges, uma negra e uma branca, apenas pela vontade. O dossel de estrelas e as luas nos ombros ligam a vitória ao céu, com a cidade conquistada já para trás.",q:["Para onde estou realmente a dirigir a minha energia?","Que forças opostas em mim precisam de seguir na mesma direcção?"]},
"Strength":{sym:"A donzela fecha a boca do leão com mãos nuas e serenas, coroada de flores e com a lemniscata do infinito sobre a cabeça. Não há luta na cena: há confiança, paciência e uma força que vem de dentro.",q:["Que instinto meu pede ternura em vez de repressão?","Onde estou a confundir dureza com força?"]},
"The Hermit":{sym:"No cume nevado, o ancião ergue a lanterna onde brilha uma estrela de seis pontas: a luz interior que orienta os outros. O bastão sustenta o caminho e o manto cinzento fala de recolhimento voluntário.",q:["De que preciso de me afastar para ver com clareza?","Que verdade só encontro no silêncio?"]},
"Wheel of Fortune":{sym:"A roda gira com as letras TARO e os símbolos alquímicos; a esfinge domina o topo, a serpente desce e Anúbis sobe. Nos cantos, as quatro criaturas aladas estudam os seus livros: o destino move-se, a sabedoria observa.",q:["Que ciclo está a virar na minha vida?","Como posso fluir com esta mudança em vez de resistir?"]},
"Justice":{sym:"Sentada entre pilares, segura a espada erguida numa mão e a balança na outra: decidir e pesar são um só gesto. A coroa e o manto vermelho falam de autoridade lúcida, sem venda nos olhos.",q:["Que consequência dos meus actos estou a evitar encarar?","Onde preciso de repor equilíbrio ou verdade?"]},
"The Hanged Man":{sym:"Suspenso por um pé numa árvore viva em forma de T, cruza a perna livre num quatro e mantém o rosto sereno, com uma auréola em volta da cabeça. A rendição, aqui, ilumina em vez de humilhar.",q:["O que ganho se parar de forçar esta situação?","Que perspectiva nova surge se eu virar tudo ao contrário?"]},
"Death":{sym:"O esqueleto em armadura negra monta um cavalo branco e ergue a bandeira com a rosa de cinco pétalas: a vida que renasce do fim. O rei jaz, o bispo reza, a criança oferece flores; ao fundo, o sol desponta entre duas torres.",q:["O que precisa de terminar para eu poder renascer?","A que me estou a agarrar por medo do vazio?"]},
"Temperance":{sym:"O anjo verte a água entre duas taças num fluxo que parece impossível, com um pé na terra e outro na água. O triângulo no peito e o caminho que sobe até ao sol falam de alquimia paciente entre matéria e espírito.",q:["Que extremos em mim pedem mistura e medida?","Onde tenho de trocar a pressa pela paciência?"]},
"The Devil":{sym:"Uma paródia sombria dos Enamorados: o casal acorrentado ao bloco negro, sob o pentagrama invertido e a tocha que aponta para baixo. As correntes estão largas: sairiam, se quisessem.",q:["Que corrente estou a manter por escolha própria?","Que desejo meu se transformou em prisão?"]},
"The Tower":{sym:"O raio arranca a coroa do topo da torre construída no pico. Duas figuras caem entre línguas de fogo na noite fechada: tudo o que assentava em ilusão vem abaixo de um só golpe.",q:["Que estrutura da minha vida assenta em bases falsas?","O que ficaria de pé em mim se tudo o resto caísse?"]},
"The Star":{sym:"Nua e sem defesas, a figura ajoelha com um pé na água e verte dois jarros, um na terra e outro no lago. Sobre ela, uma grande estrela de oito pontas e sete menores; na árvore, o íbis do pensamento pousa tranquilo.",q:["O que me devolve esperança depois da queda?","Como posso nutrir-me e nutrir o que me rodeia?"]},
"The Moon":{sym:"O caminho atravessa entre o cão e o lobo, o domesticado e o selvagem, e segue entre duas torres até às montanhas. Do lago sobe o lagostim, o medo antigo, e a lua goteja um orvalho ambíguo sobre tudo.",q:["Que medo cresce no escuro e diminui à luz?","Onde estou a confundir o que sinto com o que imagino?"]},
"The Sun":{sym:"A criança nua cavalga o cavalo branco de braços abertos, sem sela nem medo, com a bandeira vermelha da vitalidade. Atrás do muro, os girassóis voltam-se para o grande sol de rosto humano: nada aqui se esconde.",q:["O que me dá alegria simples e genuína?","Onde posso mostrar-me sem máscara?"]},
"Judgement":{sym:"O anjo Gabriel toca a trombeta com a bandeira da cruz e os mortos erguem-se dos túmulos de braços abertos: adultos e crianças respondem ao chamado. As montanhas ao fundo dizem que a convocação não se pode ignorar.",q:["Que chamado interior estou a adiar responder?","O que preciso de perdoar, em mim ou nos outros, para encerrar este ciclo?"]},
"The World":{sym:"Dentro da coroa oval de louros, atada por fitas vermelhas em forma de infinito, a figura dança com dois bastões: o domínio tornado leveza. Nos quatro cantos, as criaturas do zodíaco fixo testemunham a obra completa.",q:["O que estou prestes a concluir e merece celebração?","Que aprendizagem levo deste ciclo para o próximo?"]},
"Ace of Wands":{sym:"A mão surge da nuvem a segurar um bastão vivo, ainda a rebentar folhas que caem como pequenas chamas. Ao longe, um castelo no monte: a promessa daquilo em que a faísca se pode tornar.",q:["Que ideia me está a pedir corpo agora?","Onde sinto entusiasmo genuíno, sem obrigação?"]},
"Two of Wands":{sym:"Do alto das ameias, a figura segura o globo do mundo na mão enquanto contempla o mar. Um bastão está fixo ao muro, o outro na sua mão: entre o conquistado e o possível, decide-se o rumo.",q:["Que horizonte maior estou a evitar olhar?","O que faria se não tivesse medo de sair do seguro?"]},
"Three of Wands":{sym:"De costas, no promontório, a figura observa os barcos que enviou. Os três bastões firmes no chão sustentam a espera: o plano já navega, os resultados começam a chegar ao porto.",q:["O que pus em movimento que ainda não colhi?","Que próximo passo prepara a expansão?"]},
"Four of Wands":{sym:"Quatro bastões erguem uma grinalda de flores e frutos, como um pórtico de festa. Duas figuras erguem ramos em celebração diante do castelo: a estrutura mínima que basta para haver alegria e pertença.",q:["Que conquista minha ainda não celebrei?","Onde está o meu verdadeiro sentido de casa?"]},
"Five of Wands":{sym:"Cinco jovens agitam bastões em direcções cruzadas, sem ordem nem líder. Ninguém sangra: é mais treino e fricção do que guerra, o choque de vontades a testar posições.",q:["Este conflito vale a energia que me consome?","O que estou a tentar provar, e a quem?"]},
"Six of Wands":{sym:"O cavaleiro avança no cavalo branco com o louro da vitória no bastão e na fronte, saudado pela multidão. O reconhecimento é público: o mérito viu-se e aplaudiu-se.",q:["Que vitória minha merece ser reconhecida, por mim primeiro?","Como recebo o aplauso sem depender dele?"]},
"Seven of Wands":{sym:"Do terreno elevado, a figura defende-se de seis bastões que sobem de baixo. Os sapatos desirmanados denunciam a pressa com que teve de se pôr de pé: a posição é boa, mas exige vigilância.",q:["O que estou a defender, e porque vale a pena?","A pressão vem de fora ou também de dentro?"]},
"Eight of Wands":{sym:"Oito bastões atravessam o céu limpo em pleno voo, paralelos e desimpedidos, sobre o rio e a colina. Não há figuras humanas: só movimento puro, a caminho de aterrar.",q:["O que se está a acelerar na minha vida?","Estou pronto para responder quando a notícia chegar?"]},
"Nine of Wands":{sym:"Com a cabeça ligada e o olhar desconfiado, a figura apoia-se no seu bastão diante da paliçada dos outros oito. Ferido mas de pé: a experiência tornou-o vigilante, talvez demasiado.",q:["Que batalha antiga ainda me faz estar em guarda?","Falta pouco: o que me ajuda a aguentar este último troço?"]},
"Ten of Wands":{sym:"A figura curva-se sob o feixe de dez bastões que carrega contra o peito, tapando a própria visão do caminho. A cidade está perto: o fardo é real, mas o destino também.",q:["O que carrego que não é meu para carregar?","O que posso delegar ou largar já esta semana?"]},
"Page of Wands":{sym:"Em pleno deserto, com pirâmides ao fundo, o jovem contempla o rebento no topo do seu bastão. As salamandras na túnica, criaturas do fogo, dizem que o entusiasmo é a sua natureza.",q:["Que curiosidade quero seguir sem garantias?","O que gostava de experimentar só pelo gosto de tentar?"]},
"Knight of Wands":{sym:"O cavalo empina-se e o cavaleiro inclina-se para a frente, com o penacho e a túnica de salamandras a arder de movimento. Tudo na carta quer partir já.",q:["Onde é que o meu ímpeto ajuda, e onde atropela?","Que aventura me pede coragem agora?"]},
"Queen of Wands":{sym:"No trono guardado por leões, segura o bastão e um girassol virado para a luz. Aos pés, o gato preto: o instinto e a sombra domesticados, ao serviço do seu magnetismo.",q:["Onde brilho naturalmente quando não me contenho?","Que parte de mim pede mais confiança pública?"]},
"King of Wands":{sym:"O rei senta-se na ponta do trono, pronto a levantar-se, com o bastão florido na mão. Leões e salamandras decoram o trono e o manto; uma salamandra viva passa aos seus pés: o fogo obedece-lhe.",q:["Que visão minha merece liderança a sério?","Como inspiro sem impor?"]},
"Ace of Cups":{sym:"A pomba desce com a hóstia até à taça que jorra cinco correntes de água sobre o lago de lótus. A mão oferece-a da nuvem: o coração recebe mais do que consegue conter.",q:["A que amor, novo ou renovado, me quero abrir?","O que faria transbordar o meu coração neste momento?"]},
"Two of Cups":{sym:"O homem e a mulher trocam taças sob o caduceu alado com cabeça de leão: paixão e entendimento a selar o pacto. O gesto é de igualdade: cada um dá e recebe na mesma medida.",q:["Esta relação assenta em reciprocidade real?","O que tenho eu para oferecer a esta união?"]},
"Three of Cups":{sym:"Três mulheres dançam em círculo com as taças erguidas, entre frutos e flores da colheita. A roda fechada entre elas é o próprio símbolo: a alegria multiplica-se quando é partilhada.",q:["Que amizades me sustentam de verdade?","O que tenho para celebrar com os meus?"]},
"Four of Cups":{sym:"Sentado sob a árvore, de braços e pernas cruzados, o jovem ignora as três taças à sua frente e a quarta que uma mão lhe estende da nuvem. O fechamento é corporal: a oportunidade está literalmente à vista.",q:["Que oferta estou a recusar sem sequer olhar?","O meu tédio é cansaço, ou é defesa?"]},
"Five of Cups":{sym:"O manto negro cobre a figura que fixa as três taças entornadas, de costas para as duas que continuam de pé. A ponte sobre o rio conduz ao castelo: o caminho de regresso existe, basta virar-se.",q:["O que perdi e ainda não chorei até ao fim?","Que duas taças continuam de pé atrás de mim?"]},
"Six of Cups":{sym:"Num pátio antigo, a criança mais velha oferece à mais nova uma taça com uma flor branca: ternura pura, sem cálculo. As seis taças floridas fazem do passado um jardim.",q:["Que memória doce me pode nutrir hoje sem me prender?","A quem devo ou quero oferecer ternura simples?"]},
"Seven of Cups":{sym:"Sete taças flutuam na nuvem diante da silhueta: um rosto, uma figura velada e radiante, uma serpente, um castelo, jóias, uma coroa de louros junto a uma caveira, um dragão. Cada desejo traz o seu risco escondido.",q:["Qual destas opções é real, e qual é miragem?","O que ganho quando finalmente escolho uma só taça?"]},
"Eight of Cups":{sym:"Sob uma lua que é ao mesmo tempo cheia e minguante, a figura parte de bastão na mão, deixando oito taças empilhadas com uma falha visível: faltava uma, faltava algo. O caminho sobe pela margem.",q:["O que está completo por fora mas vazio por dentro?","Que procura de sentido estou a adiar?"]},
"Nine of Cups":{sym:"O anfitrião senta-se de braços cruzados e sorriso satisfeito diante do arco de nove taças na bancada coberta de azul. A abundância está exposta: conquistou-a e sabe-o.",q:["Que desejo meu já se cumpriu e ainda não agradeci?","O meu contentamento é profundo, ou é vitrina?"]},
"Ten of Cups":{sym:"O casal ergue os braços para o arco-íris de dez taças enquanto as crianças dançam ao lado; a casa e o rio completam a cena. É a taça do Ás transformada em vida partilhada.",q:["Como está a harmonia real dos meus laços mais próximos?","O que é, para mim, uma vida emocional plena?"]},
"Page of Cups":{sym:"Com a túnica florida e o barrete ondulante, o jovem ergue a taça de onde um peixe o espreita: a imaginação a saltar do fundo do sentir. Atrás, o mar ondula tranquilo.",q:["Que mensagem do coração ando a desvalorizar?","Onde posso levar a minha imaginação mais a sério?"]},
"Knight of Cups":{sym:"O cavaleiro avança a passo lento, taça estendida como oferta, com asas no elmo e nos calcanhares. O rio corre entre as margens: a proposta emocional chega com graça, não com pressa.",q:["Que convite do coração quero fazer, ou aceitar?","O meu romantismo tem chão por baixo?"]},
"Queen of Cups":{sym:"No trono à beira-mar, contempla a única taça fechada de todo o baralho, ornada de anjos: guarda o mistério do sentir. Os pés quase tocam a água sem se afogar nela.",q:["Como cuido dos outros sem me perder neles?","Que emoção minha pede escuta atenta?"]},
"King of Cups":{sym:"O trono assenta numa plataforma no meio do mar agitado; atrás saltam um golfinho e um navio. O rei segura taça e ceptro imperturbável, com o talismã de peixe ao peito: sente tudo, não se afoga em nada.",q:["Como mantenho o centro quando as emoções sobem?","Onde é que a minha calma é sabedoria, e onde é repressão?"]},
"Ace of Swords":{sym:"A mão ergue da nuvem a espada que atravessa a coroa, de onde pendem o louro da vitória e a palma. As montanhas áridas ao fundo dizem que a clareza se conquista em terreno difícil.",q:["Que verdade preciso de nomear sem rodeios?","Onde me falta clareza para decidir?"]},
"Two of Swords":{sym:"De costas para o mar semeado de rochedos, a figura vendada cruza duas espadas sobre o peito, em equilíbrio tenso. A lua crescente assiste: a decisão adiada não desaparece, espera.",q:["Que decisão estou a adiar ao recusar ver?","O que aconteceria se tirasse a venda?"]},
"Three of Swords":{sym:"O coração vermelho suspenso é trespassado por três espadas sob um céu de chuva. Não há figuras nem cenário: só a dor, nítida e sem disfarce, a exigir ser sentida.",q:["Que mágoa preciso de atravessar em vez de contornar?","Que verdade dolorosa acabou por me libertar?"]},
"Four of Swords":{sym:"O cavaleiro jaz em efígie, mãos em prece, com três espadas suspensas na parede e uma gravada sob o corpo: as batalhas ficam penduradas, uma reserva fica à mão. O vitral abençoa o repouso.",q:["Que descanso ando a negar a mim mesmo?","O que precisa de recuperar antes da próxima etapa?"]},
"Five of Swords":{sym:"O vencedor recolhe as espadas com um sorriso enquanto dois derrotados se afastam de ombros caídos; o céu rasga-se em nuvens dentadas. Ganhou o campo, perdeu tudo o resto.",q:["Ter razão está a custar-me o quê?","Que batalha devia simplesmente abandonar?"]},
"Six of Swords":{sym:"O barqueiro empurra a embarcação onde seguem, curvados, uma figura embrulhada e uma criança. As seis espadas espetadas na proa seguem viagem: leva-se o aprendido, deixa-se a tormenta. A água à frente já está lisa.",q:["De que águas agitadas me estou finalmente a afastar?","Que bagagem levo, e qual posso deixar na margem?"]},
"Seven of Swords":{sym:"Em bicos de pés, a figura afasta-se do acampamento com cinco espadas nos braços e um sorriso de esperteza, deixando duas espetadas para trás. Ao longe, o grupo não repara: a jogada é pela calada.",q:["Onde estou a agir pela calada, e porquê?","A minha estratégia é astúcia legítima ou fuga?"]},
"Eight of Swords":{sym:"Vendada e frouxamente amarrada, a figura está de pé entre oito espadas espetadas como uma cerca incompleta, com poças de água aos pés e o castelo no alto. A prisão tem aberturas por todos os lados.",q:["Que crença me prende mais do que qualquer facto?","Que primeiro passo pequeno desmonta esta jaula?"]},

"Nine of Pentacles":{sym:"Entre vinhas carregadas, a senhora do jardim pousa a mão sobre os pentáculos e segura no pulso o falcão encapuzado: o instinto treinado, sob domínio elegante. Um caracol atravessa a cena: isto levou tempo.",q:["Que independência já conquistei e não reconheço?","Como posso desfrutar do que construí, sem culpa?"]},
"Ten of Pentacles":{sym:"O ancião de manto bordado com vinhas e luas repousa com os seus dois cães, enquanto o casal e a criança conversam sob o arco com brasões. Os dez pentáculos desenham a Árvore da Vida sobre a cena inteira.",q:["Que legado quero deixar aos que vêm depois de mim?","O que estou a construir que dura para além de mim?"]},
"Page of Pentacles":{sym:"O jovem atravessa o campo lavrado de olhos postos no pentáculo que ergue ao nível do rosto, como quem estuda uma promessa. Nada o distrai: entre a semente e o futuro só falta o trabalho.",q:["Que competência nova quero começar a estudar?","Qual é o primeiro passo prático, pequeno e concreto?"]},
"Knight of Pentacles":{sym:"O único cavaleiro parado do baralho: o cavalo negro de lavoura assenta as quatro patas no chão enquanto o cavaleiro contempla o pentáculo, com um ramo de carvalho no elmo. A força dele é não sair do caminho.",q:["Onde preciso de mais constância e menos brilho?","A minha rotina serve o objectivo, ou virou piloto automático?"]},
"Queen of Pentacles":{sym:"No trono esculpido com frutos, cabras e querubins, sob um arco de rosas, a rainha embala o pentáculo no colo como quem cuida de algo vivo. No canto, salta um coelho: a fertilidade discreta da terra.",q:["Como estou a cuidar do meu corpo, da casa e dos recursos?","Onde dou tanto aos outros que não sobra para mim?"]},
"King of Pentacles":{sym:"O manto do rei está coberto de cachos de uva e o trono decorado com touros; um pé em armadura espreita sob a veste: a fartura foi conquistada, não herdada. Atrás, o castelo que construiu.",q:["O que já construí que me dá base sólida?","O sucesso material está a servir a minha vida, ou a substituí-la?"]}
};

/* ---------- Estado ---------- */
const state = { cat:"all", num:"all", q:"", reversed:false };

/* ---------- Utilitários ---------- */
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function suitDot(cat){return SUITS[cat] ? SUITS[cat].hex : "#b89344";}
function badgeText(c){ return c.cat==="major" ? c.roman : RANK_SHORT[c.rank]; }
function pad2(n){ return n<10 ? "0"+n : ""+n; }
function metaEyebrow(c){
  if(c.cat==="major") return "Arcano Maior · "+c.roman;
  const s=SUITS[c.cat];
  return s.label+" · "+s.el;
}
function haystack(c){
  const s=SUITS[c.cat];
  return norm([c.pt,c.en,c.kw.join(" "),s.label,s.en,s.el,c.roman||"",c.rank?RANK_LABEL[c.rank]:""].join(" "));
}
/* URL da gravura de 1909 (Wikimedia Commons, domínio público) */
function cardImgURL(c,w){
  let fn;
  if(c.cat==="major"){ fn = "RWS1909 - "+ROMAN2NN[c.roman]+" "+c.en.replace(/^The /,"")+".jpeg"; }
  else { fn = "RWS1909 - "+SUIT_IMG[c.cat]+" "+pad2(c.rank)+".jpeg"; }
  return "https://commons.wikimedia.org/wiki/Special:FilePath/"+encodeURIComponent(fn)+"?width="+w;
}
function makeFrame(c,size){
  const w = size==="lg" ? 520 : 150;
  const frame=document.createElement("div");
  frame.className="frame frame-"+size;
  const fb=document.createElement("div");
  fb.className="frame-fb";
  fb.textContent=badgeText(c);
  const glyph=document.createElement("span");
  glyph.className="fb-glyph";
  glyph.style.background=suitDot(c.cat);
  fb.appendChild(glyph);
  const img=document.createElement("img");
  img.className="cardimg";
  img.loading="lazy";
  img.decoding="async";
  img.alt=c.pt;
  img.src=cardImgURL(c,w);
  img.addEventListener("load",()=>img.classList.add("loaded"));
  img.addEventListener("error",()=>frame.classList.add("imgfail"));
  frame.appendChild(fb);
  frame.appendChild(img);
  return frame;
}

/* ---------- Chips de categoria ---------- */
const CATS=[
  {id:"all",label:"Todas"},
  {id:"major",label:"Maiores"},
  {id:"wands",label:"Paus"},
  {id:"cups",label:"Copas"},
  {id:"swords",label:"Espadas"},
  {id:"pentacles",label:"Ouros"},
  {id:"guide",label:"Guia"}
];
function renderCatChips(){
  const wrap=document.getElementById("catChips");
  wrap.innerHTML="";
  CATS.forEach(cd=>{
    const b=document.createElement("button");
    b.className="chip"+(state.cat===cd.id?" active":"");
    b.setAttribute("role","tab");
    b.setAttribute("aria-selected",state.cat===cd.id);
    if(SUITS[cd.id]&&cd.id!=="major"){
      b.innerHTML='<span class="dot" style="background:'+SUITS[cd.id].hex+'"></span>'+cd.label;
    } else { b.textContent=cd.label; }
    b.onclick=()=>{ state.cat=cd.id; if(cd.id==="major"||cd.id==="guide") state.num="all"; render(); };
    wrap.appendChild(b);
  });
}

/* ---------- Chips de número ---------- */
const NUMS=[
  {id:"all",label:"Todos"},{id:1,label:"Ás"},{id:2,label:"2"},{id:3,label:"3"},{id:4,label:"4"},
  {id:5,label:"5"},{id:6,label:"6"},{id:7,label:"7"},{id:8,label:"8"},{id:9,label:"9"},{id:10,label:"10"},
  {id:11,label:"Valete"},{id:12,label:"Cavaleiro"},{id:13,label:"Rainha"},{id:14,label:"Rei"}
];
function renderNumChips(){
  const wrap=document.getElementById("numChips");
  const hide=(state.cat==="major"||state.cat==="guide");
  wrap.style.display=hide?"none":"flex";
  if(hide) return;
  wrap.innerHTML="";
  NUMS.forEach(nd=>{
    const b=document.createElement("button");
    b.className="chip"+(state.num===nd.id?" active":"");
    b.textContent=nd.label;
    b.onclick=()=>{ state.num=nd.id; render(); };
    wrap.appendChild(b);
  });
}

/* ---------- Filtragem ---------- */
function filtered(){
  const tokens=norm(state.q).split(/\s+/).filter(Boolean);
  return CARDS.filter(c=>{
    if(state.cat!=="all"&&state.cat!=="guide"&&c.cat!==state.cat) return false;
    if(state.num!=="all"){ if(c.cat==="major") return false; if(c.rank!==state.num) return false; }
    if(tokens.length){ const h=haystack(c); if(!tokens.every(t=>h.includes(t))) return false; }
    return true;
  });
}

/* ---------- Render lista ---------- */
function render(){
  renderCatChips();
  renderNumChips();
  const list=document.getElementById("list");
  const guide=document.getElementById("guide");
  const count=document.getElementById("count");
  const searchWrap=document.getElementById("searchWrap");

  if(state.cat==="guide"){
    list.style.display="none";
    searchWrap.style.display="none";
    count.style.display="none";
    guide.style.display="block";
    renderGuide();
    return;
  }
  guide.style.display="none";
  searchWrap.style.display="block";
  count.style.display="block";
  list.style.display="block";

  const items=filtered();
  count.textContent=items.length+(items.length===1?" carta":" cartas");
  list.innerHTML="";
  if(!items.length){
    list.innerHTML='<div class="empty"><span>✦</span>Nenhuma carta encontrada.<br>Tenta outro termo ou ajusta os filtros.</div>';
    return;
  }
  items.forEach(c=>{
    const row=document.createElement("button");
    row.className="card-row";
    row.setAttribute("aria-label",c.pt);
    row.appendChild(makeFrame(c,"sm"));
    const txt=document.createElement("span");
    txt.className="cr-txt";
    txt.innerHTML=
      '<span class="cr-pt">'+c.pt+'</span>'+
      '<span class="cr-en">'+c.en+'</span>'+
      '<span class="cr-tags">'+c.kw.slice(0,4).join(" · ")+'</span>';
    row.appendChild(txt);
    const chev=document.createElement("span");
    chev.className="chev";
    chev.textContent="›";
    row.appendChild(chev);
    row.onclick=()=>openDetail(c);
    list.appendChild(row);
  });
}

/* ---------- Render guia ---------- */
function renderGuide(){
  const g=document.getElementById("guide");
  let html='<div class="guide-intro">Cada carta menor combina um <b>naipe</b> (o elemento e o tema geral) com um <b>número</b> (a fase do ciclo). Cruza os dois para uma leitura rápida: por exemplo, um 5 de Copas é a crise (5) aplicada às emoções (Copas).</div>';
  html+='<div class="g-h">Os naipes</div>';
  GUIDE_SUITS.forEach(s=>{
    html+='<div class="g-item"><div class="gi-h">'+
      '<span class="gi-name">'+s.name+'</span>'+
      '<span class="gi-en">'+s.en+'</span>'+
      '<span class="gi-el" style="background:'+s.hex+'">'+s.el+'</span>'+
      '</div><div class="gi-body">'+s.body+'</div></div>';
  });
  html+='<div class="g-h">Os números</div>';
  GUIDE_NUMS.forEach(x=>{
    html+='<div class="g-item"><div class="g-num-row">'+
      '<span class="gi-num">'+x.n+'</span>'+
      '<span class="gi-body">'+x.body+'</span>'+
      '</div></div>';
  });
  g.innerHTML=html;
}

/* ---------- Detalhe da carta ---------- */
function openDetail(c){
  const root=document.getElementById("detailRoot");
  const s=SUITS[c.cat];
  const revHiddenClass=state.reversed?"":"rev-hidden";
  const tags=c.kw.map(k=>'<span class="tag">'+k+'</span>').join("");
  const ex=EXTRA[c.en]||{};
  const symHtml=ex.sym?'<div class="sec sec-sym"><div class="sec-h"><span class="k">Na imagem</span></div><div class="sec-body"><p>'+ex.sym+'</p></div></div>':'';
  const qHtml=ex.q?'<div class="sec sec-q"><div class="sec-h"><span class="k">Para reflectir</span></div><div class="sec-body"><ul class="qlist">'+ex.q.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul></div></div>':'';
  root.innerHTML=
  '<div class="detail" id="detailPanel" role="dialog" aria-label="'+c.pt+'">'+
    '<div class="d-head">'+
      '<button class="back" id="backBtn">‹ Voltar</button>'+
      '<span class="d-headtitle">'+(c.cat==="major"?"Arcano Maior":s.label)+'</span>'+
    '</div>'+
    '<div class="d-body">'+
      '<div class="d-eyebrow">'+metaEyebrow(c)+'</div>'+
      '<div class="d-imgslot" id="dImgSlot"></div>'+
      '<h1 class="d-pt">'+c.pt+'</h1>'+
      '<div class="d-en">'+c.en+'</div>'+
      '<div class="d-tags">'+tags+'</div>'+
      '<div class="flourish">✦</div>'+
      '<div class="sec sec-up">'+
        '<div class="sec-h"><span class="k">Direito</span></div>'+
        '<div class="sec-body"><p class="dropcap">'+c.up+'</p></div>'+
      '</div>'+
      '<div class="sec sec-rev '+revHiddenClass+'" id="revSec">'+
        '<div class="sec-h"><span class="k">Invertido</span></div>'+
        '<button class="reveal" id="revealBtn">▾ Ver significado invertido</button>'+
        '<div class="sec-body"><p>'+c.rev+'</p></div>'+
      '</div>'+
      symHtml+
      qHtml+
    '</div>'+
  '</div>';
  document.getElementById("dImgSlot").appendChild(makeFrame(c,"lg"));
  document.body.style.overflow="hidden";
  document.getElementById("backBtn").onclick=closeDetail;
  const rb=document.getElementById("revealBtn");
  if(rb) rb.onclick=()=>{ document.getElementById("revSec").classList.remove("rev-hidden"); };
  const panel=document.getElementById("detailPanel");
  panel.tabIndex=-1; panel.focus();
  document.addEventListener("keydown",escClose);
}
function closeDetail(){
  document.getElementById("detailRoot").innerHTML="";
  document.body.style.overflow="";
  document.removeEventListener("keydown",escClose);
}
function escClose(e){ if(e.key==="Escape") closeDetail(); }

/* ---------- Toggle invertidos ---------- */
const revToggle=document.getElementById("revToggle");
function setRev(v){
  state.reversed=v;
  revToggle.classList.toggle("on",v);
  revToggle.setAttribute("aria-checked",v);
}
revToggle.onclick=()=>setRev(!state.reversed);
revToggle.onkeydown=(e)=>{ if(e.key===" "||e.key==="Enter"){ e.preventDefault(); setRev(!state.reversed); } };

/* ---------- Pesquisa ---------- */
const qInput=document.getElementById("q");
const clrBtn=document.getElementById("clr");
qInput.addEventListener("input",()=>{
  state.q=qInput.value;
  clrBtn.classList.toggle("show",qInput.value.length>0);
  render();
});
clrBtn.onclick=()=>{ qInput.value=""; state.q=""; clrBtn.classList.remove("show"); qInput.focus(); render(); };

/* ---------- Início ---------- */
render();
</script>
</body>
</html>
